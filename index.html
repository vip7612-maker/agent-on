<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent ONAi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+KR:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <!-- 아이콘 처리를 위해 Iconify 사용 -->
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo" id="desktopLogoBtn" style="cursor: pointer; display: flex; align-items: center;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-right: 8px;">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-dasharray="1 6"/>
            <path d="M12 6L13.5 10.5L18 12L13.5 13.5L12 18L10.5 13.5L6 12L10.5 10.5L12 6Z" fill="currentColor"/>
          </svg>
          <span class="logo-text">Agent ONAi</span>
        </div>
        <div class="header-actions">
          <button class="icon-btn" aria-label="새 대화"><iconify-icon icon="mdi:square-edit-outline"></iconify-icon></button>
          <button class="icon-btn" id="sidebarToggleBtn" aria-label="사이드바 토글"><iconify-icon icon="lucide:panel-left"></iconify-icon></button>
        </div>
      </div>
      <div class="sidebar-nav">
        <div class="nav-item active" id="navChat"><iconify-icon icon="mdi:message-outline"></iconify-icon> <span class="nav-label">채팅</span></div>
        <div class="nav-item" id="navHistory"><iconify-icon icon="mdi:history"></iconify-icon> <span class="nav-label">지난 채팅</span></div>
        <div class="nav-item" id="navBoard"><iconify-icon icon="mdi:text-box-check-outline"></iconify-icon> <span class="nav-label">Board</span></div>
      </div>
      <div class="sidebar-footer" style="position: relative;">
        <button class="google-btn" id="googleLoginBtn">
          <iconify-icon icon="logos:google-icon"></iconify-icon> <span class="nav-label">구글로 로그인</span>
        </button>
        <div class="user-profile" id="userProfile" style="display: none; align-items: center; justify-content: space-between; padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: background 0.2s;">
          <div style="display: flex; align-items: center; gap: 12px;">
            <div class="avatar" style="width: 36px; height: 36px; border-radius: 50%; background: var(--bg-input); display:flex; align-items:center; justify-content:center; color:var(--text-high); overflow:hidden;"></div>
            <div class="user-info" style="display: flex; flex-direction: column;">
              <span class="user-name" style="font-weight: 500; font-size: 0.95rem;">이경진</span>
              <span style="font-size: 0.8rem; color: var(--text-muted); margin-top:2px;">Pro 요금제</span>
            </div>
          </div>
          <div class="user-profile-icons" style="display: flex; align-items: center; gap: 6px; color: var(--text-muted);">
            <iconify-icon icon="lucide:download" style="font-size: 0.95rem; padding: 4px; border: 1px solid var(--border-color); border-radius: 6px;"></iconify-icon>
            <iconify-icon icon="lucide:chevrons-up-down" style="font-size: 1rem;"></iconify-icon>
          </div>
        </div>

        <!-- 팝업 메뉴 UI -->
        <div class="user-menu-popup" id="userMenuPopup">
          <div class="menu-email" id="menuEmail">vip7612@gmail.com</div>
          <div class="menu-divider"></div>
          
          <div class="menu-req-item">
            <span><iconify-icon icon="lucide:settings"></iconify-icon> 설정</span>
            <span class="shortcut">⌘,</span>
          </div>
          <div class="menu-req-item">
            <span><iconify-icon icon="lucide:globe"></iconify-icon> 언어</span>
            <iconify-icon icon="lucide:chevron-right"></iconify-icon>
          </div>
          <div class="menu-req-item">
            <span><iconify-icon icon="lucide:help-circle"></iconify-icon> 도움 받기</span>
          </div>
          
          <div class="menu-divider"></div>
          
          <div class="menu-req-item">
            <span><iconify-icon icon="lucide:arrow-up-circle"></iconify-icon> 요금제 업그레이드</span>
          </div>
          <div class="menu-req-item">
            <span><iconify-icon icon="lucide:download"></iconify-icon> 앱 및 확장 프로그램 받기</span>
          </div>
          <div class="menu-req-item">
            <span><iconify-icon icon="lucide:gift"></iconify-icon> Agent ONAi 선물하기</span>
          </div>
          <div class="menu-req-item">
            <span><iconify-icon icon="lucide:info"></iconify-icon> 자세히 알아보기</span>
            <iconify-icon icon="lucide:chevron-right"></iconify-icon>
          </div>
          
          <div class="menu-divider"></div>
          
          <div class="menu-req-item" id="logoutBtn">
            <span><iconify-icon icon="lucide:log-out"></iconify-icon> 로그아웃</span>
          </div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="mobile-header">
        <button class="icon-btn menu-toggle"><iconify-icon icon="mdi:menu"></iconify-icon></button>
        <div class="logo" id="mobileLogoBtn" style="cursor: pointer; display: flex; align-items: center;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-right: 8px;">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-dasharray="1 6"/>
            <path d="M12 6L13.5 10.5L18 12L13.5 13.5L12 18L10.5 13.5L6 12L10.5 10.5L12 6Z" fill="currentColor"/>
          </svg>
          <span class="logo-text">Agent ONAi</span>
        </div>
        <button class="icon-btn"><iconify-icon icon="mdi:square-edit-outline"></iconify-icon></button>
      </header>

      <div class="chat-container" id="chatView">
        <!-- 대화가 없을 때 나타나는 초기 환영 화면 -->
        <div class="welcome-screen" id="welcomeScreen">
          <h1 class="welcome-title" id="welcomeTitle">🌙 좋은 밤입니다, 교장님</h1>
          <p class="welcome-subtitle">무엇을 도와드릴까요?</p>
        </div>

        <!-- 실제 메시지가 추가되는 영역 -->
        <div class="messages" id="messages">
          <!-- 메시지가 동적으로 추가됨 -->
        </div>

        <!-- 입력창 영역 -->
        <div class="input-container">
          <div class="input-box">
            <button class="icon-btn" aria-label="첨부"><iconify-icon icon="mdi:paperclip"></iconify-icon></button>
            <input type="text" id="chatInput" placeholder="Agent ONAi에게 물어보세요..." autocomplete="off" />
            <button class="icon-btn" id="micBtn" aria-label="음성"><iconify-icon icon="mdi:microphone"></iconify-icon></button>
            <button class="icon-btn active" id="sendBtn" aria-label="전송"><iconify-icon icon="mdi:arrow-up-circle"></iconify-icon></button>
          </div>
          <div class="input-footer">
            <span>Agent ONAi는 나만의 에이전트 서버에 세팅된 Antigravity Agent와 대화합니다.</span>
          </div>
        </div>
      </div>
      
      <!-- 히스토리 화면 컨테이너 -->
      <div class="history-container" id="historyView" style="display: none;">
        <div class="history-header">
           <h2 style="font-weight: 600; font-size: 1.5rem; margin-bottom: 16px;">History</h2>
           <div class="search-box">
             <iconify-icon icon="mdi:magnify" style="color: var(--text-muted);"></iconify-icon>
             <input type="text" placeholder="대화 내용 검색" style="border: none; outline: none; background: transparent; color: var(--text-primary); width: 100%;">
           </div>
        </div>
        <div class="history-list" id="historyList">
           <!-- 서버에서 동적으로 리스트가 추가됨 -->
        </div>
      </div>
      
      <!-- 보드 뷰 화면 컨테이너 -->
      <div class="board-container" id="boardView" style="display: none; flex: 1; flex-direction: column; padding: 24px; overflow-y: auto; background-color: var(--bg-main);">
        <div class="board-header" style="margin-bottom: 24px;">
           <h2 style="font-weight: 600; font-size: 1.5rem; margin-bottom: 8px;">Board</h2>
           <span style="color: var(--text-muted); font-size: 0.9rem;">클립보드 버튼 옆 핀 아이콘을 눌러 중요한 대화를 모아두세요.</span>
        </div>
        <div class="board-list" id="boardList" style="display: flex; flex-direction: column; gap: 24px;">
           <!-- 동적으로 저장된 답변이 추가됨 -->
        </div>
      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
